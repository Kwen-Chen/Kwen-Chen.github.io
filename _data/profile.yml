short_bio: >-
  <h6> 👨‍🔬 About Me </h6>
  <p>
    I am a two-year PhD student at the
    <a href="https://mais.ia.ac.cn/" target="_blank"> State Key Laboratory of Multimodal Artificial Intelligence Systems(MAIS)</a>,
    <a href="http://www.ia.cas.cn/" target="_blank">Institute of Automation, Chinese Academy of Sciences (CASIA)</a>,
    majoring in Computer Application Technology.
    Before that, I received my B.Eng. degree in Automation from
    <a href="https://www.uestc.edu.cn/" target="_blank">University of Electronic Science and Technology of China (UESTC)</a>
    in 2024.
  </p>
  <h6> 🌱 Interests </h6>
  <p>
    My research interests focus on <strong>Large Language Models (LLMs)</strong> and <strong>Multimodal Large Language Models (MLLMs)</strong>,
    including training, alignment (RLHF/RLVR), agentic systems, and long-context extension.
    I thrive on following cutting-edge AI research, actively contributing to open-source communities.
  </p>

